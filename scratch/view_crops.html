<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4FAF5;
            padding: 20px;
            text-align: center;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .crop-box {
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 300px;
        }
        .crop-box img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }
        h2 {
            color: #1D5321;
        }
    </style>
</head>
<body>
    <h2>Review Founder Crop Candidates</h2>
    <div class="container">
        <div class="crop-box">
            <h3>Crop 1 (Fuller Portrait)</h3>
            <img src="founder_crop_1.png">
        </div>
        <div class="crop-box">
            <h3>Crop 2 (Mid Portrait)</h3>
            <img src="founder_crop_2.png">
        </div>
        <div class="crop-box">
            <h3>Crop 3 (Head Shot)</h3>
            <img src="founder_crop_3.png">
        </div>
        <div class="crop-box">
            <h3>Crop 4 (Standard Chest/Head)</h3>
            <img src="founder_crop_4.png">
        </div>
    </div>
</body>
</html>
